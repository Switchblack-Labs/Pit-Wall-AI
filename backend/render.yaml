services:
  - type: web
    name: pitwall-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health/
    envVars:
      - key: LLM_PROVIDER
        value: auto
      - key: LLM_FALLBACK_ORDER
        value: watsonx,replicate,ollama,echo
      - key: WATSONX_API_KEY
        sync: false
      - key: WATSONX_PROJECT_ID
        sync: false
      - key: WATSONX_URL
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: LANGFLOW_URL
        sync: false
      - key: LANGFLOW_API_KEY
        sync: false
